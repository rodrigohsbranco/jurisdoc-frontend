server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # index.html nunca cacheia: força o navegador a revalidar a cada visita.
  # Sem isso, Chrome (especialmente Windows) serve o HTML velho do disk cache,
  # que aponta para chunks de uma versão antiga -> "dados fantasmas".
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
    expires off;
  }

  # Vue Router (history mode): qualquer rota cai no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache para assets com hash do Vite (nome muda a cada build, seguro cachear longo)
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }
}